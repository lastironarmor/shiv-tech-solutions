<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - शिव यादव</title>
    <style>
        /* बेसिक स्टाइलिंग */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Google Form Iframe को रिस्पॉन्सिव बनाना */
        .form-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 120%; /* फॉर्म की ऊंचाई के अनुसार इसे एडजस्ट करें */
        }

        .form-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="contact-container">
    <h2>हमसे संपर्क करें</h2>
    <p>कृपया नीचे दिए गए फॉर्म को भरें, हम जल्द ही आपसे संपर्क करेंगे।</p>
    
    <div class="form-wrapper">
        <iframe src="यहाँ_अपना_GOOGLE_FORM_LINK_पेस्ट_करें" 
                frameborder="0" marginheight="0" marginwidth="0">
            Loading…
        </iframe>
    </div>

    <div class="footer-text">
        © 2026 शिव यादव | आपकी गोपनीयता हमारी प्राथमिकता है।
    </div>
</div>

</body>
</html>
